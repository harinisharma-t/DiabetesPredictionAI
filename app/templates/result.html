<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Diabetes Prediction Result</h1>

    <div class="result">
        <h2 style="color: {{ color }};">{{ prediction }}</h2>

        <div class="confidence-box">
    <strong>Confidence:</strong> {{ confidence }}%
        </div>

        <p>
            <strong>Disclaimer:</strong><br>
            This prediction is generated using a Machine Learning model and
            is intended for educational purposes only. It is not a medical diagnosis.
            Please consult a healthcare professional for an accurate assessment.
        </p>
    </div>

    <a href="/">
        <button>Predict Again</button>
    </a>

</div>

</body>
</html>
