<!DOCTYPE html>
<html>
<head>
   <h1>Diabetes Prediction System</h1>

<p class="subtitle">
Enter the patient's health information below to predict the likelihood of diabetes.
</p>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Diabetes Prediction System</h1>

<form action="/predict" method="POST">

<label>Pregnancies</label>
<input type="number" name="Pregnancies" placeholder="e.g. 2" required>

<label>Glucose</label>
<input type="number" name="Glucose" placeholder="e.g. 120" required>

<label>Blood Pressure</label>
<input type="number" name="BloodPressure" placeholder="e.g. 70" required>

<label>Skin Thickness</label>
<input type="number" name="SkinThickness" placeholder="e.g. 20" required>

<label>Insulin</label>
<input type="number" name="Insulin" placeholder="e.g. 79" required>

<label>BMI</label>
<input type="number" step="0.1" name="BMI" placeholder="e.g. 25.5" required>

<label>Diabetes Pedigree Function</label>
<input type="number" step="0.001" name="DiabetesPedigreeFunction" placeholder="e.g. 0.351" required>

<label>Age</label>
<input type="number" name="Age" placeholder="e.g. 33" required>
<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
